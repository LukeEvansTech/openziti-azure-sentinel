[project]
site_name = "OpenZiti → Azure Sentinel"
site_description = "Ship OpenZiti events into Microsoft Sentinel via the native Service Bus event sink, an Azure Function, and the Logs Ingestion API"
site_author = "Luke Evans"
copyright = "Copyright 2026 Luke Evans - MIT licensed."
nav = [
    { "Overview" = "index.md" },
    { "How it works" = "how-it-works.md" },
    { "Deployment" = "deployment.md" },
    { "Architecture" = "architecture.md" },
    { "Troubleshooting" = "troubleshooting.md" },
]

[project.theme]
name = "material"
language = "en"
features = [
    "navigation.sections",
    "navigation.indexes",
    "navigation.top",
    "content.code.copy",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
